<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0f0f0f;
      color: #fff;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: -1px;
    }

    p {
      margin-top: 1rem;
      font-size: 1.1rem;
      color: #888;

</head>
<body>
  <div class="container">
    <h1>Hello World!</h1>
    <p>Welcome to my website.</p>
  </div>
</body>
</html>
